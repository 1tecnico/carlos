<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Mochila Escolar Inteligente</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #eef2f7;
      margin: 0;
      padding: 0;
    }
    header {
      background: #4a90e2;
      color: white;
      padding: 15px;
      text-align: center;
    }
    .container {
      padding: 20px;
      max-width: 800px;
      margin: auto;
    }
    .card {
      background: white;
      padding: 15px;
      border-radius: 10px;
      margin-bottom: 15px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }
    input, textarea, button {
      width: 100%;
      padding: 10px;
      margin-top: 5px;
      margin-bottom: 10px;
      border-radius: 5px;
      border: 1px solid #ccc;
    }
    button {
      background: #4a90e2;
      color: white;
      border: none;
      cursor: pointer;
    }
    button:hover {
      background: #357abd;
    }
    .aula {
      border-top: 1px solid #ddd;
      padding-top: 10px;
      margin-top: 10px;
    }
  </style>
</head>
<body>

<header>
  <h1>🎒 Minha Mochila Escolar</h1>
  <p>Organize suas aulas e anotações</p>
</header>

<div class="container">

  <div class="card">
    <h2>Adicionar Aula</h2>
    <input type="text" id="nomeAula" placeholder="Nome da aula (ex: Matemática)">
    <textarea id="anotacaoAula" placeholder="Anotações da aula..."></textarea>
    <button id="btnAdicionar">Adicionar Aula</button>
  </div>

  <div class="card">
    <h2>Minhas Aulas</h2>
    <div id="listaAulas"></div>
  </div>

</div>

<script>
  let aulas = [];

  document.getElementById("btnAdicionar").addEventListener("click", function() {
    const nome = document.getElementById('nomeAula').value;
    const anotacao = document.getElementById('anotacaoAula').value;

    if (nome === '' || anotacao === '') {
      alert('Preencha todos os campos!');
      return;
    }

    aulas.push({ nome, anotacao });
    atualizarLista();

    document.getElementById('nomeAula').value = '';
    document.getElementById('anotacaoAula').value = '';
  });

  function atualizarLista() {
    const lista = document.getElementById('listaAulas');
    lista.innerHTML = '';

    aulas.forEach((aula, index) => {
      const div = document.createElement('div');
      div.className = 'aula';
      div.innerHTML = `
        <strong>${aula.nome}</strong>
        <p>${aula.anotacao}</p>
        <button class="btnRemover" data-index="${index}">Remover</button>
      `;
      lista.appendChild(div);
    });

    document.querySelectorAll(".btnRemover").forEach(btn => {
      btn.addEventListener("click", function() {
        const index = this.getAttribute("data-index");
        removerAula(index);
      });
    });
  }

  function removerAula(index) {
    aulas.splice(index, 1);
    atualizarLista();
  }
</script>

</body>
</html>
