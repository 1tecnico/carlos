<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Painel de Disciplinas</title>

<style>

body{
font-family:Arial;
background:#eef2ff;
margin:0;
}

header{
background:#4338ca;
color:white;
text-align:center;
padding:20px;
}

.container{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(300px,1fr));
gap:20px;
padding:20px;
}

.card{
background:white;
padding:15px;
border-radius:10px;
box-shadow:0 3px 10px rgba(0,0,0,0.1);
}

.card h2{
margin-top:0;
color:#4338ca;
}

input,textarea{
width:100%;
padding:8px;
margin-top:5px;
margin-bottom:10px;
}

button{
background:#4338ca;
color:white;
border:none;
padding:6px 10px;
border-radius:5px;
cursor:pointer;
}

button:hover{
background:#312e81;
}

.aula{
background:#eef2ff;
padding:8px;
border-radius:6px;
margin-bottom:6px;
}

</style>
</head>

<body>

<header>
<h1>📚 Painel de Disciplinas</h1>
<p>Organização de matérias e aulas</p>
</header>

<div class="container" id="container"></div>

<script>

/* DISCIPLINAS DA BNCC + TECNOLOGIA */

const disciplinas = [

"Português",
"Matemática",
"História",
"Geografia",
"Física",
"Química",
"Biologia",
"Inglês",
"Educação Física",
"Artes",

"Programação",
"Robótica",
"Inteligência Artificial",
"Desenvolvimento Web",
"Banco de Dados",
"Algoritmos",
"Redes de Computadores"

]

let dados = JSON.parse(localStorage.getItem("disciplinas")) || {}

function salvar(){

localStorage.setItem("disciplinas",JSON.stringify(dados))

}

function criarPainel(){

const container = document.getElementById("container")

container.innerHTML=""

disciplinas.forEach(nome=>{

if(!dados[nome]) dados[nome]=[]

let aulasHTML=""

dados[nome].forEach((aula,i)=>{

aulasHTML += `
<div class="aula">
<strong>${aula.titulo}</strong>
<p>${aula.conteudo}</p>
<button onclick="removerAula('${nome}',${i})">Remover</button>
</div>
`

})

container.innerHTML += `

<div class="card">

<h2>${nome}</h2>

<input id="titulo-${nome}" placeholder="Título da aula">

<textarea id="conteudo-${nome}" placeholder="Conteúdo da aula"></textarea>

<button onclick="addAula('${nome}')">Adicionar Aula</button>

<div>${aulasHTML}</div>

</div>

`

})

}

function addAula(nome){

const titulo = document.getElementById(`titulo-${nome}`).value
const conteudo = document.getElementById(`conteudo-${nome}`).value

if(!titulo || !conteudo) return

dados[nome].push({
titulo,
conteudo
})

salvar()

criarPainel()

}

function removerAula(nome,i){

dados[nome].splice(i,1)

salvar()

criarPainel()

}

criarPainel()

</script>

</body>
</html>
