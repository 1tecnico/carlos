<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mochila do Carlos</title>

<style>
body{
font-family: Arial;
margin:0;
background:linear-gradient(135deg,#5f27cd,#ff6b81);
color:#333;
}

header{
text-align:center;
color:white;
padding:20px;
}

.container{
max-width:1000px;
margin:auto;
background:white;
padding:20px;
border-radius:12px;
box-shadow:0 5px 20px rgba(0,0,0,0.2);
margin-bottom:30px;
}

h2{
border-bottom:2px solid #eee;
padding-bottom:5px;
}

input,textarea,button{
padding:8px;
margin:5px 0;
width:100%;
}

button{
background:#5f27cd;
color:white;
border:none;
border-radius:6px;
cursor:pointer;
}

button:hover{
background:#341f97;
}

ul{
list-style:none;
padding:0;
}

li{
background:#f1f2f6;
padding:8px;
margin:5px 0;
border-radius:6px;
display:flex;
justify-content:space-between;
}

.area{
background:#f8f9fa;
padding:10px;
border-radius:8px;
margin-top:10px;
}
</style>
</head>

<body>

<header>
<h1>🎒 Mochila Escolar do Carlos</h1>
<p>Português e Matemática</p>
</header>

<div class="container">

<h2>📚 Tarefas Gerais</h2>
<input type="text" id="tarefaInput" placeholder="Digite a tarefa">
<input type="date" id="dataInput">
<button onclick="adicionarTarefa()">Adicionar</button>
<ul id="listaTarefas"></ul>

<h2>🇧🇷 Português</h2>

<div class="area">
<h3>✍️ Redação</h3>
<textarea id="redacao" rows="5" placeholder="Escreva sua redação aqui..."></textarea>
<p>Palavras: <span id="contador">0</span></p>
<button onclick="salvarRedacao()">Salvar Redação</button>
</div>

<div class="area">
<h3>📖 Resumo</h3>
<textarea id="resumo" rows="4" placeholder="Escreva seu resumo..."></textarea>
<button onclick="salvarResumo()">Salvar Resumo</button>
</div>

<div class="area">
<h3>📘 Conteúdos Estudados</h3>
<input type="text" id="conteudoPort" placeholder="Ex: Figuras de linguagem">
<button onclick="addConteudoPort()">Adicionar</button>
<ul id="listaPortugues"></ul>
</div>

<h2>➗ Matemática</h2>

<div class="area">
<h3>🧮 Calculadora</h3>
<input type="text" id="calc" placeholder="Ex: 5*8+2">
<button onclick="calcular()">Calcular</button>
<p>Resultado: <span id="resultado"></span></p>
</div>

<div class="area">
<h3>📊 Treino de Tabuada</h3>
<p id="pergunta"></p>
<input type="number" id="resposta">
<button onclick="verificar()">Responder</button>
<p id="feedback"></p>
</div>

<div class="area">
<h3>📐 Fórmulas Importantes</h3>
<input type="text" id="formulaInput" placeholder="Ex: Área do quadrado = lado²">
<button onclick="addFormula()">Adicionar</button>
<ul id="listaFormulas"></ul>
</div>

</div>

<script>
let tarefas = JSON.parse(localStorage.getItem("tarefas")) || [];
let conteudosPort = JSON.parse(localStorage.getItem("conteudosPort")) || [];
let formulas = JSON.parse(localStorage.getItem("formulas")) || [];

function salvar(){
localStorage.setItem("tarefas",JSON.stringify(tarefas));
localStorage.setItem("conteudosPort",JSON.stringify(conteudosPort));
localStorage.setItem("formulas",JSON.stringify(formulas));
localStorage.setItem("redacao",document.getElementById("redacao").value);
localStorage.setItem("resumo",document.getElementById("resumo").value);
}

function adicionarTarefa(){
let texto=document.getElementById("tarefaInput").value;
let data=document.getElementById("dataInput").value;
if(texto && data){
tarefas.push(texto+" | "+data);
document.getElementById("tarefaInput").value="";
renderTarefas();
salvar();
}
}

function renderTarefas(){
let lista=document.getElementById("listaTarefas");
lista.innerHTML="";
tarefas.forEach((t,i)=>{
lista.innerHTML+=`<li>${t} <button onclick="removerTarefa(${i})">X</button></li>`;
});
}

function removerTarefa(i){
tarefas.splice(i,1);
renderTarefas();
salvar();
}

document.getElementById("redacao").addEventListener("input",function(){
let texto=this.value.trim();
let palavras=texto?texto.split(/\s+/).length:0;
document.getElementById("contador").innerText=palavras;
});

function salvarRedacao(){salvar();}
function salvarResumo(){salvar();}

function addConteudoPort(){
let valor=document.getElementById("conteudoPort").value;
if(valor){
conteudosPort.push(valor);
document.getElementById("conteudoPort").value="";
renderPort();
salvar();
}
}

function renderPort(){
let lista=document.getElementById("listaPortugues");
lista.innerHTML="";
conteudosPort.forEach((c,i)=>{
lista.innerHTML+=`<li>${c} <button onclick="removerPort(${i})">X</button></li>`;
});
}

function removerPort(i){
conteudosPort.splice(i,1);
renderPort();
salvar();
}

function calcular(){
let exp=document.getElementById("calc").value;
try{
document.getElementById("resultado").innerText=eval(exp);
}catch{
document.getElementById("resultado").innerText="Erro";
}
}

let n1=Math.floor(Math.random()*10);
let n2=Math.floor(Math.random()*10);
document.getElementById("pergunta").innerText=`Quanto é ${n1} x ${n2}?`;

function verificar(){
let resp=parseInt(document.getElementById("resposta").value);
if(resp===n1*n2){
document.getElementById("feedback").innerText="Correto!";
}else{
document.getElementById("feedback").innerText="Tente novamente.";
}
}

function addFormula(){
let valor=document.getElementById("formulaInput").value;
if(valor){
formulas.push(valor);
document.getElementById("formulaInput").value="";
renderFormulas();
salvar();
}
}

function renderFormulas(){
let lista=document.getElementById("listaFormulas");
lista.innerHTML="";
formulas.forEach((f,i)=>{
lista.innerHTML+=`<li>${f} <button onclick="removerFormula(${i})">X</button></li>`;
});
}

function removerFormula(i){
formulas.splice(i,1);
renderFormulas();
salvar();
}

document.getElementById("redacao").value=localStorage.getItem("redacao")||"";
document.getElementById("resumo").value=localStorage.getItem("resumo")||"";

renderTarefas();
renderPort();
renderFormulas();
</script>

</body>
</html>
