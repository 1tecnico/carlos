<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mochila do Carlos</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{
  font-family: Arial;
  background:#eef2ff;
  margin:0;
}
header{
  background:#4f46e5;
  color:white;
  padding:20px;
  text-align:center;
}
.container{
  padding:20px;
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(300px,1fr));
  gap:20px;
}
.card{
  background:white;
  padding:20px;
  border-radius:10px;
  box-shadow:0 4px 10px rgba(0,0,0,0.1);
}
button{
  background:#4f46e5;
  color:white;
  border:none;
  padding:8px 12px;
  border-radius:5px;
  cursor:pointer;
}
input,textarea{
  width:100%;
  padding:8px;
  margin-top:5px;
  margin-bottom:10px;
}
#grafico{
  width:100%;
  height:250px;
}
</style>
</head>

<body>

<header>
<h1>🎒 Mochila do Carlos</h1>
<p>Sistema de ajuda para estudos</p>
</header>

<div class="container">

<!-- Calendário -->
<div class="card">
<h2>📅 Calendário Escolar</h2>
<input type="date" id="dataEvento">
<input type="text" id="eventoInput" placeholder="Prova ou Trabalho">
<button onclick="addEvento()">Adicionar</button>
<ul id="listaEventos"></ul>
</div>

<!-- Gráfico de Notas -->
<div class="card">
<h2>📊 Gráfico de Notas</h2>
<input type="text" id="materiaNota" placeholder="Matéria">
<input type="number" id="notaValor" placeholder="Nota">
<button onclick="addNota()">Adicionar Nota</button>
<canvas id="grafico"></canvas>
</div>

<!-- Sistema de Tarefas -->
<div class="card">
<h2>🧠 Sistema de Tarefas</h2>
<input id="tarefa" placeholder="Nova tarefa">
<button onclick="addTarefa()">Adicionar</button>
<ul id="lista"></ul>
</div>

<!-- Resumos -->
<div class="card">
<h2>📚 Resumos</h2>
<textarea id="resumo" placeholder="Escreva seu resumo aqui"></textarea>
<button onclick="salvarResumo()">Salvar resumo</button>
<p id="status"></p>
</div>

<!-- Modo Prova -->
<div class="card">
<h2>📝 Modo Prova - Matemática</h2>
<p id="pergunta"></p>
<input type="number" id="resposta">
<button onclick="verificar()">Responder</button>
<p id="resultado"></p>
<p>Acertos: <span id="acertos">0</span></p>
</div>

</div>

<script>
// CALENDÁRIO
let eventos = JSON.parse(localStorage.getItem("eventos")) || [];

function addEvento(){
  const data = document.getElementById("dataEvento").value;
  const evento = document.getElementById("eventoInput").value;
  if(data && evento){
    eventos.push(`${data} - ${evento}`);
    localStorage.setItem("eventos", JSON.stringify(eventos));
    document.getElementById("eventoInput").value = "";
    renderEventos();
  }
}

function renderEventos(){
  const lista = document.getElementById("listaEventos");
  lista.innerHTML = "";
  eventos.forEach(e => lista.innerHTML += `<li>${e}</li>`);
}

renderEventos();

// GRAFICO DE NOTAS
let materias = [];
let notas = [];
const ctx = document.getElementById("grafico");
const grafico = new Chart(ctx,{
  type:'bar',
  data:{
    labels:materias,
    datasets:[{
      label:'Notas',
      data:notas,
      backgroundColor:'#4f46e5'
    }]
  },
  options:{
    scales:{
      y:{beginAtZero:true, max:10}
    }
  }
});

function addNota(){
  const mat = document.getElementById("materiaNota").value;
  const nota = parseFloat(document.getElementById("notaValor").value);
  if(mat && !isNaN(nota)){
    materias.push(mat);
    notas.push(nota);
    grafico.update();
    document.getElementById("materiaNota").value="";
    document.getElementById("notaValor").value="";
  }
}

// SISTEMA DE TAREFAS
function addTarefa(){
  const t = document.getElementById("tarefa").value;
  if(t){
    const li = document.createElement("li");
    li.textContent = t;
    document.getElementById("lista").appendChild(li);
    document.getElementById("tarefa").value="";
  }
}

// RESUMOS
function salvarResumo(){
  localStorage.setItem("resumo", document.getElementById("resumo").value);
  document.getElementById("status").innerText = "Resumo salvo!";
}
document.getElementById("resumo").value = localStorage.getItem("resumo") || "";

// MODO PROVA
let n1, n2, acertos=0;

function novaPergunta(){
  n1 = Math.floor(Math.random()*10)+1;
  n2 = Math.floor(Math.random()*10)+1;
  document.getElementById("pergunta").innerText = `Quanto é ${n1} x ${n2}?`;
  document.getElementById("resposta").value = "";
}

function verificar(){
  let r = parseInt(document.getElementById("resposta").value || "0");
  if(r === n1*n2){
    acertos++;
    document.getElementById("resultado").innerText = "✅ Acertou! Nova pergunta.";
    document.getElementById("acertos").innerText = acertos;
    novaPergunta();
  }else{
    document.getElementById("resultado").innerText = "❌ Errado, tente novamente.";
  }
}

novaPergunta();
</script>

</body>
</html>
