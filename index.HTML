<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Mochila do Carlos</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

body{
font-family:Arial;
margin:0;
background:linear-gradient(135deg,#6c5ce7,#fd79a8);
color:#333;
}

header{
text-align:center;
color:white;
padding:20px;
}

.container{
max-width:1000px;
margin:auto;
background:white;
padding:20px;
border-radius:12px;
box-shadow:0 5px 20px rgba(0,0,0,0.2);
margin-bottom:30px;
}

h2{
border-bottom:2px solid #eee;
padding-bottom:5px;
}

input,textarea,button{
width:100%;
padding:8px;
margin:5px 0;
}

button{
background:#6c5ce7;
color:white;
border:none;
border-radius:6px;
cursor:pointer;
}

button:hover{
background:#4834d4;
}

.area{
background:#f1f2f6;
padding:10px;
border-radius:8px;
margin-top:10px;
}

</style>
</head>

<body>

<header>

<h1>🎒 Mochila Escolar do Carlos</h1>
<p>Organizador completo de estudos</p>

</header>

<div class="container">

<h2>📅 Calendário Escolar</h2>

<input type="date" id="dataEvento">
<input type="text" id="eventoInput" placeholder="Prova ou atividade">
<button onclick="addEvento()">Adicionar</button>

<ul id="listaEventos"></ul>

<h2>📊 Gráfico de Notas</h2>

<input type="text" id="materiaNota" placeholder="Matéria">
<input type="number" id="notaValor" placeholder="Nota">
<button onclick="addNota()">Adicionar Nota</button>

<canvas id="graficoNotas"></canvas>

<h2>🧠 Sistema de Estudo</h2>

<p id="dicaEstudo"></p>
<button onclick="gerarDica()">Nova dica de estudo</button>

<h2>📚 Resumo Automático</h2>

<textarea id="textoResumo" rows="6" placeholder="Cole o texto aqui"></textarea>
<button onclick="gerarResumo()">Gerar resumo</button>

<div class="area">
<p id="resumoGerado"></p>
</div>

<h2>📝 Modo Prova</h2>

<div class="area">

<p id="pergunta"></p>

<input type="number" id="resposta" placeholder="Digite sua resposta">

<button onclick="verificar()">Responder</button>

<p id="feedback"></p>

<p>Acertos: <span id="acertos">0</span></p>

</div>

</div>

<script>

/* CALENDARIO */

let eventos = JSON.parse(localStorage.getItem("eventos")) || [];

function salvar(){
localStorage.setItem("eventos",JSON.stringify(eventos));
}

function addEvento(){

let data=document.getElementById("dataEvento").value;
let evento=document.getElementById("eventoInput").value;

if(data && evento){

eventos.push(data+" - "+evento);

document.getElementById("eventoInput").value="";

renderEventos();

salvar();

}

}

function renderEventos(){

let lista=document.getElementById("listaEventos");

lista.innerHTML="";

eventos.forEach((e)=>{

lista.innerHTML+=`<li>${e}</li>`;

});

}

renderEventos();

/* GRAFICO */

let materias=[];
let notas=[];

const ctx=document.getElementById('graficoNotas');

let grafico=new Chart(ctx,{
type:'bar',
data:{
labels:materias,
datasets:[{
label:'Notas',
data:notas
}]
}
});

function addNota(){

let materia=document.getElementById("materiaNota").value;
let nota=parseFloat(document.getElementById("notaValor").value);

if(materia && nota){

materias.push(materia);
notas.push(nota);

grafico.update();

}

}

/* SISTEMA ESTUDO */

const dicas=[
"Revise a matéria 10 minutos após estudar",
"Explique a matéria para outra pessoa",
"Faça exercícios para fixar",
"Use mapas mentais",
"Revise no dia seguinte"
];

function gerarDica(){

let sorteio=Math.floor(Math.random()*dicas.length);

document.getElementById("dicaEstudo").innerText=dicas[sorteio];

}

/* RESUMO */

function gerarResumo(){

let texto=document.getElementById("textoResumo").value;

let frases=texto.split(".");

let resumo=frases.slice(0,2).join(".");

document.getElementById("resumoGerado").innerText=resumo;

}

/* MODO PROVA */

let n1;
let n2;
let acertos=0;

function novaPergunta(){

n1=Math.floor(Math.random()*10)+1;
n2=Math.floor(Math.random()*10)+1;

document.getElementById("pergunta").innerText=`Quanto é ${n1} x ${n2}?`;

document.getElementById("resposta").value="";

}

function verificar(){

let resp=parseInt(document.getElementById("resposta").value);

if(resp===n1*n2){

acertos++;

document.getElementById("feedback").innerText="✅ Correto! Nova pergunta.";

document.getElementById("acertos").innerText=acertos;

novaPergunta();

}else{

document.getElementById("feedback").innerText="❌ Errado, tente novamente.";

}

}

novaPergunta();

</script>

</body>
</html>
